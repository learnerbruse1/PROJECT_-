name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: 后端导入自检
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r backend/requirements.txt
      - name: import app.main
        working-directory: backend
        run: python -c "import app.main; print('backend import OK')"

  frontend:
    name: 前端构建
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - working-directory: frontend
        run: npm install
      - working-directory: frontend
        run: npm run build
