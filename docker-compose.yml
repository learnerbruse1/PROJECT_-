# 人口分布热力与公共设施叠加分析系统 —— 后端 + 前端 一键部署（F12）
# 默认使用文件后端（读取 ./data 下的 GeoJSON），无需数据库。
#
#   docker compose up --build
#   前端 http://localhost:8080   后端 http://localhost:8000/docs

services:
  backend:
    build: ./backend
    environment:
      - DATA_BACKEND=geojson
      - DATA_DIR=/data
      - CORS_ORIGINS=*
    volumes:
      - ./data/processed:/data:ro
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    build: ./frontend
    depends_on:
      - backend
    ports:
      - "8080:80"
    restart: unless-stopped
